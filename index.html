<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pulse Client</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1b1b2f 0, #050509 55%, #000 100%);
      color: #f5f5f5;
      overflow: hidden;
    }

    /* Subtle background glow orbs */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .bg-orb.red {
      width: 420px;
      height: 420px;
      background: #ff1744;
      top: -80px;
      left: -40px;
    }
    .bg-orb.blue {
      width: 380px;
      height: 380px;
      background: #2979ff;
      bottom: -120px;
      right: -40px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: min(480px, 92vw);
      padding: 32px 28px 26px;
      border-radius: 22px;
      background: rgba(10, 10, 18, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.9),
        0 0 0 1px rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(18px);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-circle {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 20%, #ff8a80, #ff1744 55%, #b71c1c);
      box-shadow: 0 0 18px rgba(255, 23, 68, 0.8);
      position: relative;
      overflow: hidden;
    }

    .logo-circle::after {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: inherit;
      border: 2px solid rgba(255, 255, 255, 0.3);
      opacity: 0.7;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .title {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 0.78rem;
      color: #b0bec5;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .status-pill {
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(46, 204, 113, 0.12);
      color: #2ecc71;
      border: 1px solid rgba(46, 204, 113, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .content {
      margin-top: 6px;
    }

    .section-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #90a4ae;
      margin-bottom: 10px;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    @media (min-width: 560px) {
      .button-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .pulse-btn {
      position: relative;
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: radial-gradient(circle at top left, #1f1f2e, #0b0b13);
      color: #eceff1;
      padding: 12px 18px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition:
        transform 0.16s ease-out,
        box-shadow 0.16s ease-out,
        border-color 0.16s ease-out,
        background 0.16s ease-out;
      box-shadow: 0 0 0 rgba(255, 23, 68, 0);
    }

    .pulse-btn span.label {
      pointer-events: none;
    }

    .pulse-btn small {
      font-size: 0.65rem;
      text-transform: none;
      opacity: 0.7;
    }

    /* Pulse animation layer */
    .pulse-btn::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 23, 68, 0.9) 0%, rgba(255, 23, 68, 0.0) 70%);
      opacity: 0;
      transform: scale(0);
      pointer-events: none;
    }

    .pulse-btn.pulsing::before {
      animation: pulse-wave 0.9s ease-out forwards;
    }

    @keyframes pulse-wave {
      0% {
        opacity: 0.9;
        transform: scale(0);
      }
      60% {
        opacity: 0.4;
        transform: scale(10);
      }
      100% {
        opacity: 0;
        transform: scale(14);
      }
    }

    .pulse-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 23, 68, 0.7);
      box-shadow:
        0 0 18px rgba(255, 23, 68, 0.45),
        0 0 1px rgba(255, 255, 255, 0.2);
      background: radial-gradient(circle at top left, #26263a, #10101b);
    }

    .pulse-btn:active {
      transform: translateY(0);
      box-shadow: 0 0 10px rgba(255, 23, 68, 0.35);
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 0.75rem;
      color: #90a4ae;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 10px;
      margin-top: 4px;
    }

    .footer-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .footer-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .chip {
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(15, 15, 25, 0.9);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .chip.red {
      border-color: rgba(255, 23, 68, 0.7);
      color: #ff8a80;
    }

    .link {
      color: #90caf9;
      text-decoration: none;
      border-bottom: 1px dashed rgba(144, 202, 249, 0.5);
      padding-bottom: 1px;
    }

    .link:hover {
      color: #e3f2fd;
      border-bottom-style: solid;
    }
  </style>
</head>
<body>
  <div class="bg-orb red"></div>
  <div class="bg-orb blue"></div>

  <div class="container">
    <div class="header">
      <div class="logo-wrap">
        <div class="logo-circle"></div>
        <div class="title-block">
          <div class="title">Pulse Client</div>
          <div class="subtitle">Modern Minecraft launcher</div>
        </div>
      </div>
      <div class="status-pill">Ready</div>
    </div>

    <div class="content">
      <div class="section-label">Main actions</div>
      <div class="button-grid">
        <button class="pulse-btn" data-action="launch">
          <span class="label">Launch</span>
          <small>Start Minecraft with Pulse</small>
        </button>
        <button class="pulse-btn" data-action="accounts">
          <span class="label">Accounts</span>
          <small>Manage profiles & logins</small>
        </button>
        <button class="pulse-btn" data-action="mods">
          <span class="label">Mods</span>
          <small>Configure Feather/Lunar‑style mods</small>
        </button>
        <button class="pulse-btn" data-action="settings">
          <span class="label">Settings</span>
          <small>Video, controls, performance</small>
        </button>
      </div>

      <div class="section-label">Extras</div>
      <div class="button-grid">
        <button class="pulse-btn" data-action="cosmetics">
          <span class="label">Cosmetics</span>
          <small>Capes, wings, and more</small>
        </button>
        <button class="pulse-btn" data-action="profiles">
          <span class="label">Profiles</span>
          <small>Different versions & configs</small>
        </button>
      </div>
    </div>

    <div class="footer">
      <div class="footer-left">
        <span>Pulse Client &copy; <span id="year"></span></span>
        <span style="opacity:0.7;">Inspired by Feather & Lunar layouts</span>
      </div>
      <div class="footer-right">
        <div class="chip red">Pulse effect</div>
        <a class="link" href="https://notpulsewave.github.io" target="_blank" rel="noopener noreferrer">
          notpulsewave.github.io
        </a>
      </div>
    </div>
  </div>

  <script>
    // Dynamic year
    document.getElementById("year").textContent = new Date().getFullYear();

    // Pulse animation logic: red pulse starts at click position and moves outward
    const buttons = document.querySelectorAll(".pulse-btn");

    buttons.forEach((btn) => {
      btn.addEventListener("click", (e) => {
        const rect = btn.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // Position the pulse origin
        btn.style.setProperty("--pulse-x", x + "px");
        btn.style.setProperty("--pulse-y", y + "px");

        // Trigger animation
        btn.classList.remove("pulsing");
        void btn.offsetWidth; // force reflow to restart animation
        btn.classList.add("pulsing");

        // Placeholder: you can hook real actions here
        const action = btn.getAttribute("data-action");
        console.log("Clicked:", action);
      });
    });

    // Tie CSS custom properties to ::before
    const style = document.createElement("style");
    style.innerHTML = `
      .pulse-btn::before {
        left: var(--pulse-x, 50%);
        top: var(--pulse-y, 50%);
        transform: translate(-50%, -50%) scale(0);
      }
      .pulse-btn.pulsing::before {
        transform-origin: center;
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
